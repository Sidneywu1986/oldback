version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: feijiu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-feijiu123}
      MYSQL_DATABASE: ${DB_NAME:-feijiu_db}
      MYSQL_USER: ${DB_USER:-feijiu_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-feijiu123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./recycle-backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: always

  backend:
    build: 
      context: ./recycle-backend
      dockerfile: Dockerfile
    container_name: feijiu-backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-feijiu_db}
      DB_USER: ${DB_USER:-feijiu_user}
      DB_PASSWORD: ${DB_PASSWORD:-feijiu123}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-feijiu-secret-key-2024}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./recycle-backend:/app
      - ./recycle-backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    image: nginx:alpine
    container_name: feijiu-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  mysql_data:
    driver: local