version: '3.8'

services:
  backend:
    build:
      context: ./recycle-backend
      dockerfile: Dockerfile
    container_name: feijiu-backend
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-feijiu-secret-key-2024}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=1440
      - DEBUG=false
    volumes:
      - ./recycle-backend/uploads:/app/uploads
      - ./recycle-backend/recycle.db:/app/recycle.db
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: nginx:alpine
    container_name: feijiu-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
